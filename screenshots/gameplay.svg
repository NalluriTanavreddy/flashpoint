<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
<defs>
  <!-- 60px checkerboard tile pattern -->
  <pattern id="fl" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
    <rect width="120" height="120" fill="#27272b"/>
    <rect x="1" y="1" width="58" height="58" fill="#fff" fill-opacity="0.028"/>
    <rect x="62" y="62" width="58" height="58" fill="#fff" fill-opacity="0.028"/>
    <line x1="0"  y1="0"  x2="0"   y2="120" stroke="#1c1c1f" stroke-width="1"/>
    <line x1="60" y1="0"  x2="60"  y2="120" stroke="#1c1c1f" stroke-width="1"/>
    <line x1="0"  y1="0"  x2="120" y2="0"   stroke="#1c1c1f" stroke-width="1"/>
    <line x1="0"  y1="60" x2="120" y2="60"  stroke="#1c1c1f" stroke-width="1"/>
  </pattern>
  <clipPath id="hcl2"><rect x="826" y="11" width="7" height="14"/></clipPath>
</defs>

<!-- Floor -->
<rect width="900" height="600" fill="url(#fl)"/>

<!-- Walls: outer thick + inner highlight -->
<rect x="5" y="5" width="890" height="590" fill="none" stroke="#444448" stroke-width="10"/>
<rect x="10" y="10" width="880" height="580" fill="none" stroke="#5a5a60" stroke-width="2"/>

<!-- Crate 1 center (200, 180) -->
<rect x="179" y="159" width="42" height="42" fill="#2a6b2a" stroke="#1a4a1a" stroke-width="2.5"/>
<line x1="183" y1="180" x2="217" y2="180" stroke="#3a8a3a" stroke-width="1"/>
<line x1="200" y1="163" x2="200" y2="197" stroke="#3a8a3a" stroke-width="1"/>

<!-- Crate 2 center (660, 360) -->
<rect x="639" y="339" width="42" height="42" fill="#2a6b2a" stroke="#1a4a1a" stroke-width="2.5"/>
<line x1="643" y1="360" x2="677" y2="360" stroke="#3a8a3a" stroke-width="1"/>
<line x1="660" y1="343" x2="660" y2="377" stroke="#3a8a3a" stroke-width="1"/>

<!-- Barrel 1 center (420, 450) -->
<circle cx="420" cy="450" r="18" fill="#c85a00" stroke="#7a3800" stroke-width="2.5"/>
<circle cx="420" cy="450" r="10" fill="none" stroke="#ff8c20" stroke-width="2"/>
<circle cx="420" cy="450" r="3"  fill="#ff8c20"/>

<!-- Barrel 2 center (570, 205) -->
<circle cx="570" cy="205" r="18" fill="#c85a00" stroke="#7a3800" stroke-width="2.5"/>
<circle cx="570" cy="205" r="10" fill="none" stroke="#ff8c20" stroke-width="2"/>
<circle cx="570" cy="205" r="3"  fill="#ff8c20"/>

<!-- Heart pickup (310, 265) -->
<circle cx="310" cy="265" r="14" fill="#ff3366" fill-opacity="0.2"/>
<circle cx="306" cy="262" r="5.5" fill="#ff3366"/>
<circle cx="314" cy="262" r="5.5" fill="#ff3366"/>
<polygon points="310,272 303,260 317,260" fill="#ff3366"/>
<ellipse cx="308" cy="260" rx="2" ry="1.5" fill="#fff" fill-opacity="0.4"/>

<!-- Particle remnants from killed enemy near (265, 145) -->
<circle cx="260" cy="143" r="3"   fill="#cc2200" fill-opacity="0.85"/>
<circle cx="271" cy="138" r="2.5" fill="#ff6633" fill-opacity="0.70"/>
<circle cx="255" cy="153" r="2"   fill="#cc2200" fill-opacity="0.60"/>
<circle cx="275" cy="150" r="3"   fill="#ff6633" fill-opacity="0.75"/>
<circle cx="263" cy="159" r="2"   fill="#cc2200" fill-opacity="0.50"/>

<!-- Enemy bullet heading left toward player -->
<circle cx="615" cy="265" r="3"   fill="#ff5533"/>
<circle cx="615" cy="265" r="5.5" fill="none" stroke="#ff5533" stroke-opacity="0.3" stroke-width="2"/>

<!-- Player bullet heading right from gun -->
<circle cx="507" cy="315" r="4"   fill="#ffe066"/>
<circle cx="507" cy="315" r="6.5" fill="none" stroke="#ffdd44" stroke-opacity="0.35" stroke-width="2"/>

<!-- ── ENEMY 1 rusher at (160, 410), angle ≈ -19° toward player ── -->
<!-- head at (160+11·cos(-19°), 410+11·sin(-19°)) ≈ (170, 406) -->
<ellipse cx="160" cy="413" rx="13" ry="10" fill="#000" fill-opacity="0.25"/>
<ellipse cx="160" cy="410" rx="11" ry="8"  fill="#991111" transform="rotate(-19, 160, 410)"/>
<circle  cx="170" cy="406" r="8"           fill="#d4a97a"/>
<rect    x="143"  y="390"  width="34" height="5" fill="#440000"/>
<rect    x="143"  y="390"  width="17" height="5" fill="#ff8844"/>
<rect    x="143"  y="390"  width="34" height="5" fill="none" stroke="#666" stroke-width="1"/>

<!-- ── ENEMY 2 gunner at (720, 155), angle ≈ 150° toward player ── -->
<!-- head at (720+11·cos(150°), 155+11·sin(150°)) ≈ (710, 161) -->
<ellipse cx="720" cy="158" rx="13" ry="10" fill="#000" fill-opacity="0.25"/>
<ellipse cx="720" cy="155" rx="11" ry="8"  fill="#cc6622" transform="rotate(150, 720, 155)"/>
<circle  cx="710" cy="161" r="8"           fill="#d4a97a"/>
<!-- Gun barrel pointing toward player (≈ 150°) -->
<line x1="718" y1="157" x2="702" y2="165" stroke="#888" stroke-width="5" stroke-linecap="round"/>
<line x1="694" y1="169" x2="702" y2="165" stroke="#bbb" stroke-width="3" stroke-linecap="round"/>
<rect x="703" y="134" width="34" height="5" fill="#004400"/>
<rect x="703" y="134" width="34" height="5" fill="#44ff44"/>
<rect x="703" y="134" width="34" height="5" fill="none" stroke="#666" stroke-width="1"/>
<text x="720" y="130" text-anchor="middle" fill="#ff5533"
      font-size="9" font-family="'Courier New',monospace" font-weight="bold">GUN</text>

<!-- ── ENEMY 3 rusher at (680, 490), angle ≈ 217° toward player ── -->
<!-- head at (680+11·cos(217°), 490+11·sin(217°)) ≈ (671, 483) -->
<ellipse cx="680" cy="493" rx="13" ry="10" fill="#000" fill-opacity="0.25"/>
<ellipse cx="680" cy="490" rx="11" ry="8"  fill="#991111" transform="rotate(217, 680, 490)"/>
<circle  cx="671" cy="483" r="8"           fill="#d4a97a"/>
<rect    x="663"  y="469"  width="34" height="5" fill="#004400"/>
<rect    x="663"  y="469"  width="34" height="5" fill="#44ff44"/>
<rect    x="663"  y="469"  width="34" height="5" fill="none" stroke="#666" stroke-width="1"/>

<!-- ── PLAYER at (450, 315), angle = 0 (facing right) ── -->
<!-- head at (461, 315) -->
<ellipse cx="450" cy="318" rx="13" ry="10" fill="#000" fill-opacity="0.25"/>
<ellipse cx="450" cy="315" rx="11" ry="8"  fill="#2255cc"/>
<circle  cx="461" cy="315" r="8"           fill="#d4a97a"/>
<circle  cx="469" cy="308" r="3.5"         fill="#000" fill-opacity="0.28"/>
<!-- Gun: grip + barrel + muzzle flash -->
<rect x="455" y="312" width="9"  height="7" fill="#777"/>
<rect x="455" y="313" width="20" height="5" fill="#aaa"/>
<circle cx="480" cy="315" r="8" fill="#fffaaa" fill-opacity="0.9"/>
<circle cx="480" cy="315" r="4" fill="#fff"    fill-opacity="0.95"/>
<circle cx="476" cy="315" r="6" fill="#ffe066" fill-opacity="0.45"/>

<!-- ════════════════ HUD ════════════════ -->

<!-- Score + active streak (top-left) -->
<text x="10" y="24" fill="#ff9955" font-family="'Courier New',monospace" font-size="13" font-weight="bold">SCORE  3200</text>
<text x="10" y="40" fill="#ff8800" font-family="'Courier New',monospace" font-size="12" font-weight="bold">×2 STREAK</text>
<rect x="10" y="44" width="68" height="3" fill="#1a1a1a"/>
<rect x="10" y="44" width="38" height="3" fill="#ff8800"/>

<!-- Level · enemies count (top-center) -->
<text x="450" y="24" text-anchor="middle"
      fill="#cccccc" font-family="'Courier New',monospace" font-size="15" font-weight="bold">LEVEL 3   ·   ENEMIES  3</text>

<!-- HP label + pips (top-right): maxHP=4, current=2.5 -->
<text x="890" y="24" text-anchor="end" fill="#ee4444" font-family="'Courier New',monospace" font-size="12" font-weight="bold">HP</text>
<circle cx="866" cy="18" r="7" fill="#ee4444" stroke="#666" stroke-width="1"/>
<circle cx="846" cy="18" r="7" fill="#ee4444" stroke="#666" stroke-width="1"/>
<circle cx="826" cy="18" r="7" fill="#333"    stroke="#666" stroke-width="1"/>
<circle cx="826" cy="18" r="7" fill="#ff8844" clip-path="url(#hcl2)"/>
<circle cx="806" cy="18" r="7" fill="#333"    stroke="#666" stroke-width="1"/>

<!-- Pause icon -->
<rect x="870" y="30" width="18" height="16" fill="#3a3a3e" stroke="#555" stroke-width="1"/>
<rect x="873" y="33" width="3.5" height="10" fill="#777"/>
<rect x="879" y="33" width="3.5" height="10" fill="#777"/>

<!-- Stats above minimap -->
<text x="14" y="474" fill="#555555" font-family="'Courier New',monospace" font-size="11">ACC 72%   KILLS 4</text>

<!-- Minimap panel: 150×100 at (14, 486) -->
<rect x="14" y="486" width="150" height="100" fill="#000" fill-opacity="0.72" stroke="#3a3a3e" stroke-width="1"/>
<text x="18" y="495" fill="#3a3a3e" font-family="'Courier New',monospace" font-size="8">RADAR</text>
<!-- Minimap scale: x/6 + 14, y/6 + 486 -->
<rect   x="45"   y="514"   width="3"   height="3"   fill="#1a4a1a"/>  <!-- crate (200,180) -->
<rect   x="122"  y="544"   width="3"   height="3"   fill="#1a4a1a"/>  <!-- crate (660,360) -->
<circle cx="84"  cy="561"  r="1.5"                  fill="#6a3a00"/>  <!-- barrel (420,450) -->
<circle cx="109" cy="520"  r="1.5"                  fill="#6a3a00"/>  <!-- barrel (570,205) -->
<circle cx="66"  cy="530"  r="1.5"                  fill="#ff3366"/>  <!-- heart (310,265) -->
<circle cx="41"  cy="554"  r="2"                    fill="#cc2200"/>  <!-- rusher (160,410) -->
<circle cx="134" cy="512"  r="2.5"                  fill="#ff8833"/>  <!-- gunner (720,155) -->
<circle cx="127" cy="568"  r="2"                    fill="#cc2200"/>  <!-- rusher (680,490) -->
<line   x1="89"  y1="539"  x2="97"    y2="539"     stroke="#4488ff" stroke-opacity="0.7" stroke-width="1.5"/>
<circle cx="89"  cy="539"  r="3"                    fill="#4488ff" stroke="#fff" stroke-width="0.8"/>

<!-- AMMO pips + label (bottom-right) -->
<text x="890" y="590" text-anchor="end"
      fill="#ffe066" font-family="'Courier New',monospace" font-size="18" font-weight="bold">AMMO  8</text>
<g fill="#ffe066" stroke="#555" stroke-width="1">
  <circle cx="880" cy="564" r="4"/><circle cx="868" cy="564" r="4"/>
  <circle cx="856" cy="564" r="4"/><circle cx="844" cy="564" r="4"/>
  <circle cx="832" cy="564" r="4"/><circle cx="820" cy="564" r="4"/>
  <circle cx="808" cy="564" r="4"/><circle cx="796" cy="564" r="4"/>
</g>
<g fill="#2a2a2a" stroke="#444" stroke-width="1">
  <circle cx="784" cy="564" r="4"/><circle cx="772" cy="564" r="4"/>
  <circle cx="760" cy="564" r="4"/><circle cx="748" cy="564" r="4"/>
  <circle cx="736" cy="564" r="4"/><circle cx="724" cy="564" r="4"/>
  <circle cx="712" cy="564" r="4"/><circle cx="700" cy="564" r="4"/>
  <circle cx="688" cy="564" r="4"/><circle cx="676" cy="564" r="4"/>
  <circle cx="664" cy="564" r="4"/>
</g>
</svg>
