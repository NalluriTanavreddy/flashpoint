<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
<defs>
  <pattern id="fl4" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
    <rect width="120" height="120" fill="#27272b"/>
    <rect x="1" y="1" width="58" height="58" fill="#fff" fill-opacity="0.028"/>
    <rect x="62" y="62" width="58" height="58" fill="#fff" fill-opacity="0.028"/>
    <line x1="0"  y1="0"  x2="0"   y2="120" stroke="#1c1c1f" stroke-width="1"/>
    <line x1="60" y1="0"  x2="60"  y2="120" stroke="#1c1c1f" stroke-width="1"/>
    <line x1="0"  y1="0"  x2="120" y2="0"   stroke="#1c1c1f" stroke-width="1"/>
    <line x1="0"  y1="60" x2="120" y2="60"  stroke="#1c1c1f" stroke-width="1"/>
  </pattern>
</defs>

<!-- Frozen game scene -->
<rect width="900" height="600" fill="url(#fl4)"/>
<rect x="5"   y="5"   width="890" height="590" fill="none" stroke="#444448" stroke-width="10"/>
<rect x="10"  y="10"  width="880" height="580" fill="none" stroke="#5a5a60" stroke-width="2"/>
<rect x="179" y="159" width="42" height="42" fill="#2a6b2a" fill-opacity="0.5" stroke="#1a4a1a" stroke-width="2"/>
<rect x="639" y="339" width="42" height="42" fill="#2a6b2a" fill-opacity="0.5" stroke="#1a4a1a" stroke-width="2"/>
<circle cx="420" cy="450" r="18" fill="#c85a00" fill-opacity="0.45"/>
<circle cx="570" cy="205" r="18" fill="#c85a00" fill-opacity="0.45"/>
<!-- Frozen player + enemies -->
<ellipse cx="450" cy="315" rx="11" ry="8" fill="#2255cc" fill-opacity="0.55"/>
<circle  cx="461" cy="315" r="8"          fill="#d4a97a" fill-opacity="0.45"/>
<ellipse cx="160" cy="410" rx="11" ry="8" fill="#991111" fill-opacity="0.45" transform="rotate(-19, 160, 410)"/>
<circle  cx="170" cy="406" r="8"          fill="#d4a97a" fill-opacity="0.35"/>
<ellipse cx="720" cy="155" rx="11" ry="8" fill="#cc6622" fill-opacity="0.45" transform="rotate(150, 720, 155)"/>
<circle  cx="710" cy="161" r="8"          fill="#d4a97a" fill-opacity="0.35"/>

<!-- Pause overlay -->
<rect width="900" height="600" fill="#000" fill-opacity="0.74"/>

<!-- Panel: PW=300 PH=480, ox=300, oy=60 -->
<rect x="300" y="60" width="300" height="480" rx="12" fill="#141418"/>
<rect x="300" y="60" width="300" height="480" rx="12" fill="none" stroke="#3a3a44" stroke-width="2"/>

<!-- PAUSED title -->
<text x="450" y="102" text-anchor="middle"
      fill="#ff4422" font-family="'Courier New',monospace" font-size="22" font-weight="bold" letter-spacing="0.24em">PAUSED</text>

<!-- VOLUME -->
<text x="450" y="138" text-anchor="middle" fill="#666" font-family="'Courier New',monospace" font-size="11" letter-spacing="0.12em">VOLUME</text>
<!-- Track -->
<rect x="350" y="153" width="200" height="6" rx="3" fill="#252528"/>
<!-- Fill 80% -->
<rect x="350" y="153" width="160" height="6" rx="3" fill="#ff9955"/>
<!-- Thumb -->
<circle cx="510" cy="156" r="8" fill="#ffffff" stroke="#aaa" stroke-width="1"/>
<!-- Value -->
<text x="450" y="178" text-anchor="middle" fill="#555" font-family="'Courier New',monospace" font-size="10">80%</text>

<!-- DIFFICULTY -->
<text x="450" y="200" text-anchor="middle" fill="#666" font-family="'Courier New',monospace" font-size="11" letter-spacing="0.12em">DIFFICULTY</text>
<!-- Easy (inactive) -->
<rect x="327" y="210" width="78" height="26" rx="4" fill="#1e1e24" stroke="#333" stroke-width="1.5"/>
<text x="366" y="227" text-anchor="middle" fill="#666" font-family="'Courier New',monospace" font-size="10">EASY</text>
<!-- Normal (active) -->
<rect x="411" y="210" width="78" height="26" rx="4" fill="#ff4422" stroke="#ff6644" stroke-width="1.5"/>
<text x="450" y="227" text-anchor="middle" fill="#fff" font-family="'Courier New',monospace" font-size="10" font-weight="bold">NORMAL</text>
<!-- Hard (inactive) -->
<rect x="495" y="210" width="78" height="26" rx="4" fill="#1e1e24" stroke="#333" stroke-width="1.5"/>
<text x="534" y="227" text-anchor="middle" fill="#666" font-family="'Courier New',monospace" font-size="10">HARD</text>

<!-- Separator 1 -->
<line x1="324" y1="252" x2="576" y2="252" stroke="#252528" stroke-width="1"/>

<!-- MOVE SPEED slider (blue) -->
<text x="450" y="268" text-anchor="middle" fill="#666" font-family="'Courier New',monospace" font-size="11" letter-spacing="0.12em">MOVE SPEED</text>
<!-- Track -->
<rect x="350" y="279" width="200" height="6" rx="3" fill="#252528"/>
<!-- Fill at 1.0x (frac = 1/3 ≈ 33%) -->
<rect x="350" y="279" width="67" height="6" rx="3" fill="#4488ff"/>
<!-- Thumb -->
<circle cx="417" cy="282" r="8" fill="#ffffff" stroke="#4488ff" stroke-width="1"/>
<!-- Value -->
<text x="450" y="298" text-anchor="middle" fill="#555" font-family="'Courier New',monospace" font-size="10">1.0x</text>

<!-- AIM DRAG slider (green) -->
<text x="450" y="314" text-anchor="middle" fill="#666" font-family="'Courier New',monospace" font-size="11" letter-spacing="0.12em">AIM DRAG</text>
<!-- Track -->
<rect x="350" y="325" width="200" height="6" rx="3" fill="#252528"/>
<!-- Fill at 1.0x (frac ≈ 33%) -->
<rect x="350" y="325" width="67" height="6" rx="3" fill="#22cc88"/>
<!-- Thumb -->
<circle cx="417" cy="328" r="8" fill="#ffffff" stroke="#22cc88" stroke-width="1"/>
<!-- Value -->
<text x="450" y="344" text-anchor="middle" fill="#555" font-family="'Courier New',monospace" font-size="10">1.0x</text>

<!-- Separator 2 -->
<line x1="324" y1="360" x2="576" y2="360" stroke="#252528" stroke-width="1"/>

<!-- RESUME button (hovered) -->
<rect x="336" y="374" width="228" height="34" rx="4" fill="#22aa44" stroke="#33cc55" stroke-width="1.5"/>
<text x="450" y="396" text-anchor="middle"
      fill="#fff" font-family="'Courier New',monospace" font-size="13" font-weight="bold" letter-spacing="0.14em">RESUME</text>

<!-- RESTART button -->
<rect x="336" y="420" width="228" height="34" rx="4" fill="#1e1e24" stroke="#333" stroke-width="1.5"/>
<text x="450" y="442" text-anchor="middle"
      fill="#bbb" font-family="'Courier New',monospace" font-size="13" font-weight="bold" letter-spacing="0.06em">RESTART</text>

<!-- MAIN MENU button -->
<rect x="336" y="466" width="228" height="34" rx="4" fill="#1e1e24" stroke="#333" stroke-width="1.5"/>
<text x="450" y="488" text-anchor="middle"
      fill="#bbb" font-family="'Courier New',monospace" font-size="13" font-weight="bold" letter-spacing="0.04em">MAIN MENU</text>

<!-- ESC hint -->
<text x="450" y="530" text-anchor="middle"
      fill="#333" font-family="'Courier New',monospace" font-size="10">ESC  ·  resume</text>

<!-- HUD still visible behind overlay -->
<text x="890" y="24" text-anchor="end" fill="#ee4444" font-family="'Courier New',monospace" font-size="12" font-weight="bold">HP</text>
<circle cx="866" cy="18" r="7" fill="#ee4444" fill-opacity="0.5" stroke="#666" stroke-width="1"/>
<circle cx="846" cy="18" r="7" fill="#ee4444" fill-opacity="0.5" stroke="#666" stroke-width="1"/>
<circle cx="826" cy="18" r="7" fill="#333"    stroke="#666" stroke-width="1"/>
<circle cx="806" cy="18" r="7" fill="#333"    stroke="#666" stroke-width="1"/>

<!-- Minimap still visible -->
<rect x="14" y="486" width="150" height="100" fill="#000" fill-opacity="0.72" stroke="#3a3a3e" stroke-width="1"/>
<text x="18" y="495" fill="#3a3a3e" font-family="'Courier New',monospace" font-size="8">RADAR</text>
<circle cx="41"  cy="554" r="2"   fill="#cc2200"/>
<circle cx="134" cy="512" r="2.5" fill="#ff8833"/>
<circle cx="89"  cy="539" r="3"   fill="#4488ff" stroke="#fff" stroke-width="0.8"/>
</svg>
